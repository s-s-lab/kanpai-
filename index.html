<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>Kanpai+</title>

  <style>
    :root {
      --primary: #e85d04;
      --primary-dark: #c94f03;
      --bg: #fff8f0;
      --card: #ffffff;
      --text: #222222;
      --muted: #666666;
      --border: #e6d8cc;
      --danger: #d62828;
      --success: #2a9d8f;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    header {
      background: linear-gradient(135deg, #e85d04, #f48c06);
      color: #ffffff;
      padding: 24px 16px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 30px;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    header p {
      margin: 8px 0 0;
      font-size: 14px;
      opacity: 0.95;
    }

    main {
      width: 100%;
      max-width: 960px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin: 16px 0;
    }

    .card h2 {
      font-size: 20px;
      margin: 0 0 12px;
    }

    .card h3 {
      font-size: 17px;
      margin: 18px 0 8px;
    }

    .lead {
      color: var(--muted);
      font-size: 14px;
      margin-top: 0;
    }

    label {
      display: block;
      font-weight: 700;
      margin: 14px 0 6px;
      font-size: 14px;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      background: #ffffff;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .date-add-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .station-shop-row {
      display: grid;
      grid-template-columns: 1fr 1.5fr auto;
      gap: 10px;
      align-items: end;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      margin-top: 10px;
      background: #fffdf9;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 13px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: var(--primary);
      color: #ffffff;
      min-height: 46px;
    }

    button:hover {
      background: var(--primary-dark);
    }

    button.secondary {
      background: #ffffff;
      color: var(--primary);
      border: 1px solid var(--primary);
    }

    button.ghost {
      background: transparent;
      color: var(--primary);
      border: 1px solid var(--border);
    }

    button.danger {
      background: #ffffff;
      color: var(--danger);
      border: 1px solid #ffb3b3;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .message {
      display: none;
      padding: 12px 14px;
      border-radius: 12px;
      margin: 12px 0;
      font-size: 14px;
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: #e8f7f4;
      color: #12695f;
      border: 1px solid #b7e4dc;
    }

    .message.error {
      background: #ffe5e5;
      color: #9d0208;
      border: 1px solid #ffb3b3;
    }

    .message.info {
      background: #fff3cd;
      color: #7a5400;
      border: 1px solid #ffe08a;
    }

    .result-box {
      background: #fff7ed;
      border: 1px solid #ffd6a5;
      border-radius: 14px;
      padding: 14px;
      margin-top: 14px;
    }

    .result-item {
      margin: 10px 0;
      overflow-wrap: anywhere;
    }

    .result-item strong {
      display: block;
      font-size: 13px;
      color: var(--muted);
    }

    .event-title {
      margin-bottom: 4px;
    }

    .status-pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #fff3cd;
      color: #7a5400;
      font-size: 12px;
      font-weight: 700;
    }

    .settlement-pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #f1f1f1;
      color: #333333;
      font-size: 12px;
      font-weight: 800;
    }

    .tabs {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      margin: 16px 0;
      padding-bottom: 4px;
    }

    .tab-button {
      white-space: nowrap;
      background: #ffffff;
      color: var(--primary);
      border: 1px solid var(--border);
      padding: 10px 14px;
      min-height: auto;
    }

    .tab-button.active {
      background: var(--primary);
      color: #ffffff;
      border-color: var(--primary);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    .list {
      display: grid;
      gap: 10px;
      margin: 10px 0;
    }

    .list-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: #ffffff;
    }

    .list-item-title {
      font-weight: 800;
    }

    .list-item-meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
      padding: 12px;
      background: #fafafa;
      border-radius: 12px;
    }

    .selected-date-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .selected-date-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      background: #ffffff;
    }

    .selected-date-item button {
      width: auto;
      min-height: 36px;
      padding: 8px 12px;
      font-size: 13px;
    }

    .score-pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #e8f7f4;
      color: #12695f;
      font-weight: 800;
      font-size: 12px;
    }

    .loading {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.75);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: var(--primary);
    }

    .loading.show {
      display: flex;
    }

    a {
      color: var(--primary);
      font-weight: 700;
    }

    .local-history-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      border-top: 1px solid var(--border);
      padding: 10px 0;
    }

    .local-history-item:first-child {
      border-top: none;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      header h1 {
        font-size: 28px;
      }

      main {
        padding: 12px;
      }

      .card {
        padding: 16px;
        border-radius: 16px;
      }

      .form-row,
      .date-add-row,
      .station-shop-row {
        grid-template-columns: 1fr;
      }

      .button-row {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      .local-history-item {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Kanpai+</h1>
    <p>日程調整からお店候補、精算管理まで。幹事のための飲み会調整アプリ。</p>
  </header>

  <main>
    <div id="messageArea" class="message"></div>

    <section id="topView">
      <div class="card">
        <h2>イベントIDで参加・確認する</h2>
        <p class="lead">共有されたイベントIDを入力すると、イベントページを開けます。</p>

        <label for="eventIdInput">イベントID</label>
        <input id="eventIdInput" type="text" placeholder="例：EVT-XXXXXXXXXX">

        <div class="button-row">
          <button type="button" onclick="goToEventById()">イベントページを開く</button>
        </div>
      </div>

      <div class="card">
        <h2>新しい飲み会を作る</h2>
        <p class="lead">幹事がイベントを作成します。作成後、参加者用URLと管理キーが発行されます。</p>

        <form id="createEventForm" onsubmit="handleCreateEvent(event)">
          <label for="eventName">イベント名 <span class="small">必須</span></label>
          <input id="eventName" type="text" placeholder="例：研究推進部 暑気払い" required>

          <label for="organizerName">幹事名 <span class="small">必須</span></label>
          <input id="organizerName" type="text" placeholder="例：鈴田" required>

          <label for="description">説明文</label>
          <textarea id="description" placeholder="例：7月中に部署内で飲み会を予定しています。"></textarea>

          <div class="form-row">
            <div>
              <label for="defaultStartTime">開始予定時刻 <span class="small">必須</span></label>
              <input id="defaultStartTime" type="time" value="19:00" required>
            </div>
            <div>
              <label for="defaultEndTime">終了予定時刻 <span class="small">必須</span></label>
              <input id="defaultEndTime" type="time" value="21:00" required>
            </div>
          </div>

          <label for="slotDateInput">候補日程 <span class="small">必須・カレンダーから選択</span></label>
          <div class="date-add-row">
            <input id="slotDateInput" type="date">
            <button type="button" class="secondary" onclick="addSlotDate()">日程を追加</button>
          </div>
          <div class="hint">選択した日付に、上で入力した開始予定時刻・終了予定時刻が自動で反映されます。</div>
          <div id="selectedDateList" class="selected-date-list"></div>

          <label>最寄り駅・お店URL候補 <span class="small">任意</span></label>
          <p class="lead">駅名ごとに、お店候補や検索結果のURLを1つ登録できます。</p>

          <div id="stationShopRows"></div>

          <div class="button-row">
            <button type="button" class="secondary" onclick="addStationShopRow()">駅候補を追加</button>
          </div>

          <label for="memo">備考</label>
          <textarea id="memo" placeholder="例：人数が決まり次第、予約します。"></textarea>

          <div class="button-row">
            <button type="submit">イベントを作成する</button>
          </div>
        </form>

        <div id="createResult" class="result-box" style="display:none;"></div>
      </div>

      <div class="card">
        <h2>この端末で作成したイベント</h2>
        <p class="lead">このブラウザに保存された簡易履歴です。</p>
        <div id="localHistory"></div>
      </div>
    </section>

    <section id="eventView" style="display:none;">
      <div class="card">
        <div class="button-row">
          <button type="button" class="ghost" onclick="showTopView()">トップに戻る</button>
        </div>

        <h2 id="eventTitle" class="event-title"></h2>
        <div id="eventStatus"></div>
        <p id="eventDescription" class="lead"></p>

        <div class="tabs">
          <button type="button" class="tab-button active" onclick="switchTab('overview')">概要</button>
          <button type="button" class="tab-button" onclick="switchTab('schedule')">日程調整</button>
          <button type="button" class="tab-button" onclick="switchTab('vote')">候補投票</button>
          <button type="button" class="tab-button" onclick="switchTab('decision')">決定事項</button>
          <button type="button" class="tab-button" onclick="switchTab('settlement')">精算</button>
          <button type="button" class="tab-button" onclick="switchTab('admin')">幹事管理</button>
        </div>

        <div id="tab-overview" class="tab-panel active">
          <h3>イベント概要</h3>
          <div id="overviewContent"></div>
        </div>

        <div id="tab-schedule" class="tab-panel">
          <h3>日程調整</h3>
          <div id="scheduleContent"></div>
        </div>

        <div id="tab-vote" class="tab-panel">
          <h3>候補投票</h3>
          <div id="voteContent"></div>
        </div>

        <div id="tab-decision" class="tab-panel">
          <h3>決定事項</h3>
          <div id="decisionContent"></div>
        </div>

        <div id="tab-settlement" class="tab-panel">
          <h3>精算</h3>
          <div id="settlementContent"></div>
        </div>

        <div id="tab-admin" class="tab-panel">
          <h3>幹事管理</h3>
          <div id="adminContent"></div>
        </div>
      </div>
    </section>
  </main>

  <div id="loading" class="loading">処理中...</div>

  <script>
    window.APP_INITIAL_EVENT_ID = <?!= JSON.stringify(initialEventId || '') ?>;
    window.APP_INITIAL_PARTICIPANT_ID = <?!= JSON.stringify(initialParticipantId || '') ?>;
    window.APP_INITIAL_EDIT_KEY = <?!= JSON.stringify(initialEditKey || '') ?>;
    window.APP_URL = <?!= JSON.stringify(appUrl || '') ?>;
  </script>

  <?!= include('app.js'); ?>
</body>
</html>
